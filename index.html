<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LabCheck AI Pro</title>

<style>
body{
font-family:Arial;
background:#f4f6f9;
padding:20px;
max-width:750px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 12px rgba(0,0,0,0.1);
}

h2{color:#0066cc}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#007bff;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{background:#0056b3}

.step{margin-top:15px}

.hidden{display:none}

ul{line-height:2}

.small{
font-size:12px;
color:#666;
margin-top:10px;
}
</style>
</head>

<body>

<div class="card">

<h2>LabCheck AI Pro</h2>

<p>Select symptoms (multiple allowed):</p>

<div class="step">
<label><input type="checkbox" value="fatigue"> Fatigue</label><br>
<label><input type="checkbox" value="hair"> Hair Loss</label><br>
<label><input type="checkbox" value="fever"> Fever</label><br>
<label><input type="checkbox" value="weight"> Weight Loss</label><br>
<label><input type="checkbox" value="pain"> Joint Pain</label>
</div>

<button onclick="generate()">Generate Report</button>

<div id="report" class="hidden">

<h3>Patient Summary</h3>
<p id="summary"></p>

<h3>Recommended Lab Tests</h3>
<ul id="tests"></ul>

<button onclick="window.print()">Print / Save PDF</button>

<p class="small">
Disclaimer: Educational use only. Not a medical diagnosis.
</p>

</div>

</div>

<script>

const rules = {

fatigue:["CBC","Ferritin","B12","TSH","HbA1c"],
hair:["CBC","Ferritin","Zinc","Vitamin D","TSH"],
fever:["CBC","CRP","ESR","Blood Culture"],
weight:["CBC","ESR","CRP","TSH","LFT"],
pain:["ESR","CRP","RF","Anti-CCP","ANA"]

};

function generate(){

let selected = document.querySelectorAll("input[type=checkbox]:checked");

let testsSet = new Set();

let symptoms = [];

selected.forEach(s=>{
symptoms.push(s.value);

if(rules[s.value]){
rules[s.value].forEach(t=>testsSet.add(t));
}
});

let tests = Array.from(testsSet);

document.getElementById("summary").innerHTML =
"Selected symptoms: " + symptoms.join(", ");

document.getElementById("tests").innerHTML =
tests.map(t=>"<li>"+t+"</li>").join("");

document.getElementById("report").classList.remove("hidden");

}

</script>

</body>
</html>
